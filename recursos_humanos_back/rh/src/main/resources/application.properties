spring.application.name=rh
spring.datasource.url=jdbc:mysql://localhost:3306/recursos_humano_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.pattern.console=[%thread] %-5level: %logger - %msg%n

spring.main.banner-mode=off
spring.jpa.open-in-view=false